title: "Modern Hebrew: เมื่อชาวยิวคืนชีพให้ภาษาที่ตายไปแล้วเกือบ 2,000 ปี"
url: "https://www.patreon.com/MrKalamplee/posts/modern-hebrew-b-162210656"
excerpt: "ภาษาฮิบรูที่ชาวยิวพูดอยู่ทุกวันนี้ (Modern Hebrew) ไม่ใช่ภาษาที่พวกเขาใช้อย่างต่อเนื่องมาแต่โบราณ แต่เป็นฝีมือการคืนชีพภาษาฮิบรูโบราณในคัมภีร์ที่ไม่มีผู้พูดเป็นภาษาแม่มาตลอด 1,700 ปี"
